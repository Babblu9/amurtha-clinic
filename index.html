<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amrutha Care – Homeopathy CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --sage: #4a7c59;
  --sage-light: #6a9e78;
  --sage-dark: #2f5238;
  --cream: #faf7f2;
  --warm-white: #f5f0e8;
  --amber: #c8883a;
  --amber-light: #e8a85a;
  --earth: #8b6f47;
  --text-primary: #1a2e22;
  --text-secondary: #4a5e52;
  --text-muted: #7a9080;
  --border: #d4e4d8;
  --border-light: #e8f0ea;
  --card-bg: #ffffff;
  --sidebar-w: 240px;
  --header-h: 64px;
  --radius: 12px;
  --shadow: 0 2px 16px rgba(30,70,40,0.08);
  --shadow-lg: 0 8px 32px rgba(30,70,40,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-primary); min-height: 100vh; }

/* ── LOGIN ── */
#login-screen {
  position: fixed; inset: 0; background: linear-gradient(135deg, #1a3022 0%, #2f5238 40%, #4a7c59 100%);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  transition: opacity .5s, transform .5s;
}
#login-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.04); }
.login-card {
  background: rgba(255,255,255,0.06); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 24px;
  padding: 48px 48px 44px; width: 400px; text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,0.3);
}
.login-logo { font-family: 'Playfair Display', serif; font-size: 28px; color: #fff; font-weight: 700; margin-bottom: 4px; }
.login-sub { color: rgba(255,255,255,0.55); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 36px; }
.login-card label { display: block; text-align: left; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 500; letter-spacing:.05em; text-transform:uppercase; margin-bottom: 6px; }
.login-card select, .login-card input {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px;
  outline: none; margin-bottom: 20px; transition: border-color .2s;
}
.login-card select option { background: #2f5238; color: #fff; }
.login-card input::placeholder { color: rgba(255,255,255,0.4); }
.login-card select:focus, .login-card input:focus { border-color: rgba(255,255,255,0.5); }
.login-btn {
  width: 100%; padding: 14px; border-radius: 10px; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--amber), var(--amber-light));
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
  letter-spacing: .02em; transition: transform .15s, box-shadow .15s;
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,136,58,.4); }
.login-leaf { font-size: 42px; margin-bottom: 16px; display: block; filter: drop-shadow(0 4px 12px rgba(0,0,0,.3)); }

/* ── LAYOUT ── */
#app { display: flex; min-height: 100vh; }
#sidebar {
  width: var(--sidebar-w); background: var(--sage-dark);
  position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
  display: flex; flex-direction: column; transition: transform .3s;
}
.sidebar-brand {
  padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
}
.brand-name { font-family: 'Playfair Display', serif; font-size: 20px; color: #fff; font-weight: 700; line-height: 1.2; }
.brand-tag { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: .07em; text-transform: uppercase; }
.sidebar-role-badge {
  margin: 12px 16px; padding: 6px 12px; background: rgba(255,255,255,0.1);
  border-radius: 20px; font-size: 11px; color: rgba(255,255,255,0.7); text-align: center;
  font-weight: 500; letter-spacing: .05em; text-transform: uppercase;
}
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.nav-section-label { padding: 12px 20px 4px; font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: .1em; text-transform: uppercase; font-weight: 600; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 20px;
  cursor: pointer; color: rgba(255,255,255,0.65); font-size: 14px; font-weight: 400;
  transition: background .15s, color .15s; border-radius: 0;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
.nav-item.active { background: rgba(255,255,255,0.1); color: #fff; border-left-color: var(--amber); font-weight: 500; }
.nav-item .nav-icon { width: 18px; text-align: center; font-size: 16px; }
.sidebar-footer {
  padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--amber); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-info .user-name { font-size: 13px; color: #fff; font-weight: 500; }
.user-info .user-role { font-size: 11px; color: rgba(255,255,255,0.45); }
.logout-btn { margin-left: auto; font-size: 18px; color: rgba(255,255,255,0.4); transition: color .2s; }
.logout-btn:hover { color: rgba(255,255,255,0.8); }

#main {
  margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh;
}
#header {
  height: var(--header-h); background: var(--card-bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 28px; gap: 16px; position: sticky; top: 0; z-index: 50;
}
.header-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--text-primary); flex: 1; }
.header-subtitle { font-size: 13px; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-weight: 400; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: all .15s; }
.btn-primary { background: var(--sage); color: #fff; }
.btn-primary:hover { background: var(--sage-dark); }
.btn-secondary { background: var(--warm-white); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border-light); }
.btn-amber { background: var(--amber); color: #fff; }
.btn-amber:hover { background: #b07530; }
.btn-danger { background: #fff0f0; color: #c04040; border: 1px solid #f0c0c0; }
.btn-danger:hover { background: #ffe0e0; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

#content { flex: 1; padding: 28px; overflow-y: auto; }

/* ── CARDS ── */
.card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; box-shadow: var(--shadow); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.card-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; color: var(--text-primary); }
.card-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ── STATS GRID ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 20px; position: relative; overflow: hidden;
}
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.stat-card.green::before { background: linear-gradient(90deg, var(--sage), var(--sage-light)); }
.stat-card.amber::before { background: linear-gradient(90deg, var(--amber), var(--amber-light)); }
.stat-card.blue::before { background: linear-gradient(90deg, #4a7a9b, #6da0c0); }
.stat-card.purple::before { background: linear-gradient(90deg, #7a6a9b, #9a8abc); }
.stat-value { font-size: 30px; font-weight: 700; color: var(--text-primary); font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.stat-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 32px; opacity: .12; }
.stat-trend { font-size: 11px; margin-top: 6px; }
.stat-trend.up { color: var(--sage); }
.stat-trend.down { color: #c04040; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid var(--border); background: var(--warm-white);
}
tbody tr { border-bottom: 1px solid var(--border-light); transition: background .12s; }
tbody tr:hover { background: var(--warm-white); }
tbody td { padding: 12px 14px; font-size: 13.5px; color: var(--text-primary); }
tbody tr:last-child { border-bottom: none; }

/* ── BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-green { background: #e8f5ec; color: #2a6b3a; }
.badge-amber { background: #fef3e2; color: #8b5a00; }
.badge-red { background: #fdeaea; color: #8b2020; }
.badge-blue { background: #e8f0fb; color: #2050a0; }
.badge-gray { background: #f0f0f0; color: #606060; }
.badge-purple { background: #f0ebfb; color: #5030a0; }

/* ── GRID LAYOUTS ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.main-side { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }

/* ── FORM ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: span 2; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
.form-control {
  padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border);
  font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--text-primary);
  outline: none; transition: border-color .2s; background: #fff;
}
.form-control:focus { border-color: var(--sage); box-shadow: 0 0 0 3px rgba(74,124,89,.1); }
textarea.form-control { resize: vertical; min-height: 80px; }

/* ── AVATAR LIST ── */
.avatar { width: 34px; height: 34px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
.av-green { background: var(--sage); }
.av-amber { background: var(--amber); }
.av-blue { background: #4a7a9b; }
.av-purple { background: #7a6a9b; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #fff; border-radius: 16px; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  padding: 28px; box-shadow: 0 24px 80px rgba(0,0,0,.2); transform: translateY(16px);
  transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; }
.modal-close { font-size: 22px; cursor: pointer; color: var(--text-muted); transition: color .15s; background: none; border: none; }
.modal-close:hover { color: var(--text-primary); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ── TABS ── */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab-btn {
  padding: 10px 20px; border: none; background: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--text-muted);
  border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;
  font-weight: 400;
}
.tab-btn.active { color: var(--sage); border-bottom-color: var(--sage); font-weight: 600; }
.tab-btn:hover:not(.active) { color: var(--text-primary); }

/* ── SEARCH ── */
.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--warm-white); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 14px;
}
.search-bar input { background: none; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--text-primary); width: 220px; }
.search-bar input::placeholder { color: var(--text-muted); }

/* ── TIMELINE ── */
.timeline { display: flex; flex-direction: column; gap: 0; }
.timeline-item { display: flex; gap: 14px; padding-bottom: 20px; position: relative; }
.timeline-item:not(:last-child)::before { content: ''; position: absolute; left: 17px; top: 34px; bottom: 0; width: 1px; background: var(--border); }
.timeline-dot { width: 34px; height: 34px; border-radius: 50%; background: var(--warm-white); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; z-index: 1; }
.timeline-dot.green { background: #e8f5ec; border-color: var(--sage); }
.timeline-dot.amber { background: #fef3e2; border-color: var(--amber); }
.timeline-body { flex: 1; padding-top: 4px; }
.timeline-title { font-size: 13.5px; font-weight: 500; color: var(--text-primary); }
.timeline-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.timeline-note { font-size: 12.5px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; background: var(--warm-white); padding: 8px 10px; border-radius: 8px; border-left: 3px solid var(--border); }

/* ── MINI CHART ── */
.mini-chart { display: flex; align-items: flex-end; gap: 4px; height: 50px; }
.mini-bar { flex: 1; border-radius: 4px 4px 0 0; background: var(--sage); opacity: .7; transition: opacity .2s; min-height: 4px; }
.mini-bar:hover { opacity: 1; }

/* ── PAGE VISIBILITY ── */
.page { display: none; }
.page.active { display: block; }

/* ── NOTICE ── */
.notice {
  padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.notice-info { background: #e8f0fb; color: #2050a0; border-left: 3px solid #4070d0; }
.notice-warn { background: #fef3e2; color: #8b5a00; border-left: 3px solid var(--amber); }
.notice-success { background: #e8f5ec; color: #2a6b3a; border-left: 3px solid var(--sage); }

/* ── MISC ── */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.text-muted { color: var(--text-muted); font-size: 12.5px; }
.flex-row { display: flex; align-items: center; gap: 10px; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }
.progress-bar { height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--sage), var(--sage-light)); border-radius: 4px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; background: var(--border-light); color: var(--text-secondary); margin: 2px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media(max-width:900px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .two-col, .three-col, .main-side { grid-template-columns: 1fr; }
}
</style>
</head>

</div>

function doLogin() {
  const role = document.getElementById('role-select').value;
  const pass = document.getElementById('login-pass').value;
  if (!pass) { alert('Please enter password'); return; }
  currentRole = role;
  const roleNames = { admin:'Admin User', doctor:'Dr. Lakshmi Devi', receptionist:'Asha Kumari', pharmacist:'Ramesh Babu', accountant:'Geeta Singh' };
  const roleInitials = { admin:'AU', doctor:'LD', receptionist:'AK', pharmacist:'RB', accountant:'GS' };
  currentUser = { name: roleNames[role], initials: roleInitials[role] };
  document.getElementById('login-screen').classList.add('hidden');
  setTimeout(() => document.getElementById('app').style.display='flex', 400);
  initApp();
}
function doLogout() {
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-pass').value='';
}

// ══════════════════════════════════════════
//  APP INIT
// ══════════════════════════════════════════
function initApp() {
  const r = ROLES[currentRole];
  // sidebar role badge
  document.getElementById('role-badge').textContent = r.display;
  document.getElementById('role-badge').style.background = r.color + '22';
  document.getElementById('role-badge').style.color = r.color;
  // user footer
  document.getElementById('user-avatar').textContent = currentUser.initials;
  document.getElementById('user-avatar').style.background = r.color;
  document.getElementById('user-name-display').textContent = currentUser.name;
  document.getElementById('user-role-display').textContent = r.display;
  // build nav
  buildNav();
  // go to first page
  const firstPage = r.pages[0];
  navigateTo(firstPage);
}

function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  const sections = NAV_SECTIONS[currentRole];
  for (const [sec, pages] of Object.entries(sections)) {
    const label = document.createElement('div');
    label.className = 'nav-section-label';
    label.textContent = sec;
    nav.appendChild(label);
    for (const p of pages) {
      const m = PAGE_META[p];
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.id = 'nav-' + p;
      item.innerHTML = `<span class="nav-icon">${m.icon}</span>${m.label}`;
      item.onclick = () => navigateTo(p);
      nav.appendChild(item);
    }
  }
}

function navigateTo(page) {
  currentPage = page;
  // update nav active
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  // update header
  const m = PAGE_META[page];
  document.getElementById('header-title').textContent = m.title;
  document.getElementById('header-subtitle').textContent = m.subtitle;
  // render page
  renderPage(page);
}

// ══════════════════════════════════════════
//  PAGE RENDERER
// ══════════════════════════════════════════
function renderPage(page) {
  const content = document.getElementById('content');
  const actions = document.getElementById('header-actions');
  actions.innerHTML = '';
  switch(page) {
    case 'dashboard':    content.innerHTML = pageDashboard(); break;
    case 'patients':     content.innerHTML = pagePatients(); setupPatientActions(actions); break;
    case 'appointments': content.innerHTML = pageAppointments(); setupApptActions(actions); break;
    case 'prescriptions':content.innerHTML = pagePrescriptions(); setupRxActions(actions); break;
    case 'inventory':    content.innerHTML = pageInventory(); setupInvActions(actions); break;
    case 'billing':      content.innerHTML = pageBilling(); setupBillingActions(actions); break;
    case 'staff':        content.innerHTML = pageStaff(); setupStaffActions(actions); break;
    case 'reports':      content.innerHTML = pageReports(); break;
  }
}
